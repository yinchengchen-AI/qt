# 本地开发用 MinIO(两个容器,基于本地镜像 minio/minio:latest + minio/mc:latest)
# 启动: docker compose -f docker-compose.minio.yml up -d
# 停止: docker compose -f docker-compose.minio.yml down
# 数据卷:  ./docker-data/minio  (删除卷 = 清空所有对象)
# Console: http://localhost:9101  账号 minioadmin / minioadmin
# API:     http://localhost:9100
# 主机端口 9100/9101 = 默认 9000/9001 + 100,避开 Colima/Lima ssh.sock 占用的 :9000/:9001
# 容器内仍是 9000/9001(qitai-minio-init 用容器名 + 9000,不受影响),改 host 侧即可。

services:
  qitai-minio:
    image: minio/minio:latest
    container_name: qitai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9100:9000"   # S3 API  (host 9100 -> container 9000)
      - "127.0.0.1:9101:9001"   # Web Console (host 9101 -> container 9001)
    volumes:
      - ./docker-data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # 启动后自动建桶 + 设为私有(CORS 由 server/storage/minio.ts 在第一次请求时配)
  qitai-minio-init:
    image: minio/mc:latest
    container_name: qitai-minio-init
    depends_on:
      qitai-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://qitai-minio:9000 minioadmin minioadmin &&
      mc mb -p local/qt-biz-attachments || true &&
      mc anonymous set none local/qt-biz-attachments &&
      echo 'MinIO ready: bucket qt-biz-attachments created (private)'
      "
    restart: "no"
