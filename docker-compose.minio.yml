# 本地开发用 MinIO 单容器(合并了原 minio + minio-init 两个服务)
# 构建上下文: ./docker/minio (Dockerfile + entrypoint.sh)
# 启动: docker compose -f docker-compose.minio.yml up -d --build
# 停止: docker compose -f docker-compose.minio.yml down
# 数据卷:  ./docker-data/minio  (删除卷 = 清空所有对象)
# Console: http://localhost:9001  账号 minioadmin / minioadmin
# API:     http://localhost:9000
#
# 设计要点:
#   - 单容器 qitai-minio 同时跑 minio server + 一次性 mc 初始化
#   - entrypoint.sh 后台起 minio,等就绪后跑 mc 建桶,再用 kill -0 轮询等待
#     (不用 wait,因 nohup 会丢父子关系;SIGTERM 通过 minio 自身接住,干净退出)

services:
  qitai-minio:
    build:
      context: ./docker/minio
      dockerfile: Dockerfile
    image: qitai-minio:latest
    container_name: qitai-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - ./docker-data/minio:/data
    healthcheck:
      test: ["CMD", "/usr/bin/mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
