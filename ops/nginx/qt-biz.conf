# /etc/nginx/conf.d/qt-biz.conf
# qt-biz 生产环境 nginx 反向代理配置 (Aliyun Linux 3 + nginx)
#
# 启用步骤:
#   sudo cp ops/nginx/qt-biz.conf /etc/nginx/conf.d/qt-biz.conf
#   sudo nginx -t                                  # 验证配置
#   sudo systemctl reload nginx                   # 重新加载
#
# 关键点:
#   - 上游 (next start) 监听 127.0.0.1:3000
#   - error_page 502 /502.html / 504 /502.html 走静态友好页
#     (502.html 在 Next.js public/ 里, build 后会出现在 /opt/qt/.next/standalone/public/ 或经 next start 直接 serve)
#     若 next start 整体挂了, 也至少能看到 502.html (因为是 nginx 自己 serve, 不走 upstream)
#   - 添加 /502 路径作为 Next.js 自身的 502 路由, 用于上游活了但内部 5xx 时的回退
#   - error_page 500 501 503 = @qt_biz_502_next 走 Next.js 自己的 /502 路由 (反代)
#     (当 next start 健康但内部抛 5xx 时, 这种方式可以避免暴露 Next.js 默认错误页)

upstream qt_biz_upstream {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;                          # 改成你的域名或公网 IP

    # 上传大小限制 (跟 next.config.mjs experimental.serverActions.bodySizeLimit 对齐)
    client_max_body_size 2m;

    # 通用代理参数
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";

    # 上游超时 (next start 在生产环境 build 后响应 < 1s, 但 SSE / 报表导出可能 30s+)
    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ---- 错误页: 上游挂了 (502/504) → 直接 nginx 静态 502.html ----
    # 这条最关键, 当 next start 整体挂掉时也能看到友好页
    error_page 502 504 = @qt_biz_502_static;

    location @qt_biz_502_static {
        # 静态友好页, 由 nginx 自己 serve (不依赖 next start)
        # public/502.html 在 next build 后会出现在 /opt/qt/public/502.html
        # (next start 默认 serve /opt/qt/public/ 下的所有静态文件)
        root /opt/qt/public;
        try_files /502.html =502;
        add_header Cache-Control "no-store" always;
    }

    # ---- 错误页: 上游活着但返回 5xx (500/503) → 走 Next.js /502 路由 ----
    # 当 next start 健康但应用层抛 5xx (例如 DB 暂时不可用) 时
    error_page 500 501 503 = @qt_biz_502_next;

    location @qt_biz_502_next {
        # 反代到 Next.js 自身的 /502 页面, 带原始 URL 作为 query
        proxy_pass http://qt_biz_upstream/502?from=$request_uri;
        proxy_intercept_errors off;       # 不要再次触发 error_page
        proxy_set_header Host $host;
        proxy_read_timeout 5s;            # 502 路由应该秒返
    }

    # ---- 健康检查端点 (运维 / 监控用) ----
    location = /healthz {
        access_log off;
        proxy_pass http://qt_biz_upstream/api/healthz;
    }

    # ---- Next.js 静态资源 (.next/static, public/) ----
    location /_next/static/ {
        proxy_pass http://qt_biz_upstream;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable";
    }

    location /static/ {
        alias /opt/qt/public/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ---- 主反向代理 ----
    location / {
        proxy_pass http://qt_biz_upstream;
    }
}