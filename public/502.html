<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>502 服务暂不可用 - qt-biz</title>
<style>
  *,*::before,*::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: #f5f5f5;
    color: #333;
  }
  .wrap {
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 560px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    padding: 48px 32px;
    text-align: center;
  }
  .code {
    font-size: 96px;
    font-weight: 600;
    line-height: 1;
    color: #d4380d;
    margin: 0 0 8px;
    letter-spacing: -2px;
  }
  .title {
    font-size: 20px;
    font-weight: 500;
    margin: 0 0 12px;
    color: #1f1f1f;
  }
  .desc {
    font-size: 14px;
    line-height: 1.6;
    color: #595959;
    margin: 0 0 28px;
  }
  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .btn {
    display: inline-block;
    min-width: 96px;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.5;
    text-align: center;
    text-decoration: none;
    border: 1px solid transparent;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary {
    color: #fff;
    background: #1677ff;
    border-color: #1677ff;
  }
  .btn-default {
    color: #333;
    background: #fff;
    border-color: #d9d9d9;
  }
  .hint {
    font-size: 12px;
    color: #999;
    margin: 16px 0 0;
  }
  .meta {
    font-size: 12px;
    color: #bbb;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid #f0f0f0;
  }
  @media (max-width: 480px) {
    .card { padding: 32px 20px; }
    .code { font-size: 72px; }
    .title { font-size: 18px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="code">502</h1>
      <h2 class="title">服务暂不可用</h2>
      <p class="desc">
        后端服务暂时无法响应您的请求。<br>
        这通常是应用正在重启或后端依赖（数据库 / 存储）暂时不可用导致的。
      </p>
      <div class="actions">
        <a class="btn btn-primary" href="javascript:location.reload()">重试</a>
        <a class="btn btn-default" href="/login">重新登录</a>
      </div>
      <p class="hint">
        页面不会自动刷新,请点击「重试」或稍候再试。<br>
        如多次出现,请联系系统管理员查看服务状态。
      </p>
      <p class="meta" id="from-url"></p>
    </div>
  </div>
  <script>
    // 仅展示用, 不影响主要功能
    (function () {
      try {
        var ref = document.referrer;
        if (ref) {
          var el = document.getElementById('from-url');
          if (el) el.textContent = '来源: ' + ref;
        }
      } catch (e) { /* noop */ }
    })();
  </script>
</body>
</html>
