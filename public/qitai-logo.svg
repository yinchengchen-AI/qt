<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" role="img" aria-label="杭州企泰安全科技 QITAI SAFETY">
  <defs>
    <mask id="qitai-cutout">
      <rect width="48" height="48" fill="white" />
      <!-- 蓝色右侧中段矩形缺口 -->
      <rect x="24" y="14" width="24" height="20" fill="black" />
    </mask>
  </defs>

  <!-- Mark: 蓝色 C/G 形(右侧中段缺口) + 红色右下 + 黑色小点 -->
  <g>
    <rect width="48" height="48" rx="6" fill="#0A1C33" mask="url(#qitai-cutout)" />
    <rect x="32" y="28" width="20" height="20" rx="3" fill="#E11A2A" />
    <rect x="58" y="14" width="6" height="6" rx="1" fill="#0A1C33" />
  </g>

  <!-- Wordmark -->
  <g transform="translate(78, 0)" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', '微软雅黑', 'Noto Sans CJK SC', sans-serif">
    <text x="0" y="26" font-size="22" font-weight="700" letter-spacing="2" fill="#0A1C33">企泰安全</text>
    <text x="0" y="48" font-size="11" font-weight="700" letter-spacing="3" fill="#0A1C33" opacity="0.75">QITAI SAFETY</text>
  </g>
</svg>
