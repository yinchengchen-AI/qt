<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" role="img" aria-label="杭州企泰安全科技 QITAI">
  <defs>
    <mask id="qitai-cutout">
      <rect width="48" height="48" fill="white" />
      <!-- 蓝色右上角矩形缺口 -->
      <rect x="32" y="0" width="16" height="24" fill="black" />
    </mask>
  </defs>

  <!-- Mark: 蓝色"C/G 形"方块(右上切角)+ 红色小方块(右下重叠)+ 黑色小点 -->
  <g>
    <rect width="48" height="48" rx="6" fill="#0A1C33" mask="url(#qitai-cutout)" />
    <rect x="32" y="28" width="20" height="20" rx="3" fill="#E11A2A" />
    <rect x="56" y="14" width="6" height="6" rx="1" fill="#0A1C33" />
  </g>

  <!-- Wordmark: "企泰安全" + "QITAI" 副标题 -->
  <g transform="translate(72, 0)" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', '微软雅黑', 'Noto Sans CJK SC', sans-serif">
    <text x="0" y="26" font-size="22" font-weight="700" letter-spacing="2" fill="#0A1C33">企泰安全</text>
    <text x="0" y="48" font-size="11" font-weight="600" letter-spacing="3" fill="#0A1C33" opacity="0.7">QITAI · SAFETY TECH</text>
  </g>
</svg>
