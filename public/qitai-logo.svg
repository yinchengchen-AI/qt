<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" role="img" aria-label="杭州企泰安全科技 QITAI">
  <defs>
    <linearGradient id="qitai-mark-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1C33" />
      <stop offset="1" stop-color="#103259" />
    </linearGradient>
    <linearGradient id="qitai-slash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F25C44" />
      <stop offset="1" stop-color="#C7381F" />
    </linearGradient>
    <linearGradient id="qitai-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F59E0B" />
      <stop offset="1" stop-color="#EA7C1A" />
    </linearGradient>
  </defs>

  <!-- Mark: 蓝色圆角方块 + 白色 Q + 红/橙斜杠 -->
  <g>
    <!-- 蓝色底 -->
    <rect x="2" y="2" width="52" height="52" rx="12" fill="url(#qitai-mark-grad)" />
    <!-- 白色 Q：环 + 内孔 + 尾巴被斜杠替代 -->
    <path d="M16 18 a14 14 0 1 0 24 0 a14 14 0 1 0 -24 0 Z M30 32 l-6 8"
          fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- 红色斜杠 (替代 Q 尾巴) -->
    <path d="M30 30 l14 16 l-6 4 l-14 -16 z" fill="url(#qitai-slash)" />
  </g>

  <!-- Wordmark -->
  <g transform="translate(64, 0)">
    <text x="0" y="26" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif"
          font-size="22" font-weight="700" letter-spacing="2"
          fill="url(#qitai-text)">企泰安全</text>
    <text x="0" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="10" font-weight="600" letter-spacing="3" fill="#6B7280">QITAI · SAFETY TECH</text>
  </g>
</svg>
